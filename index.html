<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Builder - Instant Website Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">💜</span>
                <span class="logo-text">AI Builder</span>
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="openGitHub()">GitHub</button>
                <button class="header-btn" onclick="toggleSettings()">⚙️</button>
            </div>
        </header>

        <!-- Hero -->
        <section class="hero" id="hero">
            <div class="hero-content">
                <div class="hero-badge">⚡ AI-Powered</div>
                <h1 class="hero-title">Build websites with <span class="gradient-text">AI</span></h1>
                <p class="hero-subtitle">Describe your idea, get instant code</p>
            </div>
            <div class="prompt-box">
                <div class="prompt-input-wrapper">
                    <span class="prompt-icon">💬</span>
                    <textarea class="prompt-input" id="promptInput" placeholder="Describe your website...&#10;Example: A modern landing page for a tech startup with dark theme, gradient buttons, and animated hero section"></textarea>
                    <button class="prompt-action" onclick="generateCode()">
                        <span class="btn-text">Generate</span>
                        <span class="btn-icon">✨</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- Loading State -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">AI is thinking...</div>
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Result -->
        <section class="result" id="result">
            <div class="split-view">
                <!-- Preview Panel -->
                <div class="panel preview-panel">
                    <div class="panel-header">
                        <span>PREVIEW</span>
                        <button class="panel-btn" onclick="refreshPreview()">↻</button>
                    </div>
                    <iframe id="preview" sandbox="allow-scripts"></iframe>
                </div>

                <!-- Code Panel -->
                <div class="panel code-panel">
                    <div class="panel-header">
                        <span>CODE</span>
                        <div class="panel-actions">
                            <button onclick="copyCode()">📋 Copy</button>
                        </div>
                    </div>
                    <div class="code-editor" id="codeEditor"></div>
                </div>
            </div>
        </section>

        <!-- AI Chat -->
        <section class="ai-chat" id="aiChat">
            <div class="chat-header">🤖 Ask AI to modify</div>
            <div class="chat-input-wrapper">
                <input type="text" class="chat-input" id="chatInput" placeholder="Make it darker / Add animation / Change to blue theme...">
                <button class="chat-send" onclick="sendChat()">➤</button>
            </div>
        </section>

        <!-- Actions -->
        <section class="actions" id="actions">
            <button class="action-btn" onclick="downloadZip()">
                <span class="action-icon">📥</span>
                <span>Download</span>
            </button>
            <button class="action-btn" onclick="copyCode()">
                <span class="action-icon">📋</span>
                <span>Copy</span>
            </button>
            <button class="action-btn primary" onclick="deployToGitHub()">
                <span class="action-icon">🚀</span>
                <span>Deploy</span>
            </button>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>Powered by AI • Built with 💜</p>
        </footer>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
